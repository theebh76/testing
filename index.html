<html>
<title>This is a test</title>
<style>
  .toggle-container {
    display: inline-flex;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    overflow: hidden;
    margin: 16px 0;
  }

  .toggle-btn {
    padding: 6px 16px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    color: #57606a;
  }

  .toggle-btn.active {
    background-color: #f6f8fa;
    color: #24292f;
    font-weight: 600;
  }

  .tab-content {
    display: none;
    padding: 12px;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    margin-top: 8px;
  }

  .tab-content.active {
    display: block;
  }
</style>
<body>
  <h1>Nothing to see here</h1>

  <blockquote>But maybe you can see the hidden clue
  </blockquote>

  <div class="toggle-container">
    <button class="toggle-btn active" onclick="switchTab('preview')">Preview</button>
    <button class="toggle-btn" onclick="switchTab('code')">Code</button>
  </div>

  <div id="preview" class="tab-content active">
    <p>This is the <strong>preview</strong> of your content.</p>
  </div>

  <div id="code" class="tab-content">
    <pre><code>This is the **code** view of your content.</code></pre>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(function(el) {
        el.classList.remove('active');
      });
      document.querySelectorAll('.toggle-btn').forEach(function(el) {
        el.classList.remove('active');
      });

      document.getElementById(tab).classList.add('active');
      var buttons = document.querySelectorAll('.toggle-btn');
      buttons.forEach(function(btn) {
        if (btn.textContent.toLowerCase() === tab) {
          btn.classList.add('active');
        }
      });
    }
  </script>
</body>
</html>
